name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3)'
        required: true

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag name
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches Directory.Build.props
        run: |
          props_version=$(grep -oP '(?<=<PackageVersion>)[^<]+' Directory.Build.props)
          tag_version="${{ steps.version.outputs.value }}"
          if [ "$props_version" != "$tag_version" ]; then
            echo "::error::Tag version '$tag_version' does not match PackageVersion '$props_version' in Directory.Build.props"
            exit 1
          fi
          echo "Version check passed: $tag_version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: >
          dotnet pack src/Mnemonizer/Mnemonizer.csproj
          --no-build
          --configuration Release
          --output nupkgs
          -p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Push to NuGet
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
